<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="車務日誌">
    
    <title>車務日誌</title>
    <style>
        :root { --main: #A2D2FF; --bg: #F8FBFF; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: env(safe-area-inset-top) 20px calc(80px + env(safe-area-inset-bottom)); -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 500px; margin: auto; }
        .card { background: linear-gradient(135deg, #A2D2FF, #BDE0FE); color: white; padding: 30px 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 20px rgba(162, 210, 255, 0.4); margin-bottom: 25px; }
        .card h2 { margin: 10px 0; font-size: 38px; font-weight: bold; }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; }
        .sel { flex: 1; padding: 12px; border-radius: 15px; border: 1.5px solid #A2D2FF; background: white; color: #5B99C2; font-size: 15px; font-weight: bold; -webkit-appearance: none; text-align: center;}
        .item { background: white; border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .info b { display: block; font-size: 16px; color: #444; }
        .info small { color: #AAA; font-size: 12px; }
        .price { font-size: 18px; font-weight: bold; color: #7DB9E8; }
        
        /* 修正：把 ＋ 圈圈位置強制置中且設為正圓形 */
        .add-btn { 
            position: fixed; 
            bottom: calc(30px + env(safe-area-inset-bottom)); /* 考慮安全區域 */
            right: 30px; 
            width: 70px; /* 寬 */
            height: 70px; /* 高相等，強制圓形 */
            background: #A2D2FF; 
            color: white; 
            border-radius: 50%; /* 正圓 */
            border: none; 
            font-size: 45px; 
            font-weight: 300; /* 讓 ＋ 號秀氣一點 */
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
            z-index: 999; 
            display: flex; align-items: center; justify-content: center; /* ＋ 號置中 */
            line-height: 1;
            padding-bottom: 5px; /* 視覺微調 ＋ 號高度 */
        }
        
        #pop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .box { background: white; padding: 25px; border-radius: 25px; width: 80%; max-width: 300px; }
        .box h3 { margin: 0 0 15px; text-align: center; color: #5B99C2; font-size: 18px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #EEE; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #5B99C2; text-align: center; font-size: 20px;">車務日誌 ☁️</h2>
    <div class="card">
        <p id="label" style="font-size: 14px; opacity: 0.9; margin: 0;">2026年支出</p>
        <h2 id="total">$ 0</h2>
    </div>

    <div class="filters">
        <select id="y" class="sel" onchange="show()"></select>
        <select id="m" class="sel" onchange="show()">
            <option value="all">整年</option>
            <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>
            <option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>
            <option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
    </div>
    <div id="list"></div>
</div>

<button class="add-btn" onclick="document.getElementById('pop').style.display='flex'">+</button>

<div id="pop">
    <div class="box">
        <h3>新增項目</h3>
        <input type="date" id="in-d">
        <select id="in-t" onchange="toggleNameInput()">
            <option value="油費">油費 ⛽</option>
            <option value="保養">保養 🛠️</option>
            <option value="其他">✨ 其他</option>
        </select>
        <input type="text" id="in-n" placeholder="項目名稱 (如：更換機油)" style="display:none">
        <input type="number" id="in-p" placeholder="金額" inputmode="decimal">
        <div class="btn-group">
            <button class="btn" style="background:#EEE; color:#555" onclick="document.getElementById('pop').style.display='none'">取消</button>
            <button class="btn" style="background:#A2D2FF; color:white" onclick="add()">儲存</button>
        </div>
    </div>
</div>

<script>
    var db = JSON.parse(localStorage.getItem('car_db_v3')) || []; // 使用新的數據資料庫，避免衝突
    var today = new Date();

    (function init() {
        var ys = document.getElementById('y');
        for (var i = 2026; i <= today.getFullYear() + 2; i++) {
            var o = document.createElement('option'); o.value = i; o.text = i + "年"; ys.appendChild(o);
        }
        ys.value = today.getFullYear();
        document.getElementById('m').value = String(today.getMonth() + 1).padStart(2, '0');
        document.getElementById('in-d').valueAsDate = today;
        toggleNameInput(); // 初始化時檢查類別
        show();
    })();

    // 依舊是油費不填名稱，其他的要填
    function toggleNameInput() {
        const type = document.getElementById('in-t').value;
        const nameInput = document.getElementById('in-name');
        nameInput.style.display = (type === '油費') ? 'none' : 'block';
        if (type === '油費') nameInput.value = '';
    }

    function add() {
        var d = document.getElementById('in-d').value;
        var p = document.getElementById('in-p').value;
        if(!d || !p) return;
        var dt = new Date(d);
        db.push({
            id: Date.now(),
            t: document.getElementById('in-t').value,
            n: document.getElementById('in-n').value || document.getElementById('in-t').value, // 沒填就用類別當名稱
            p: p,
            d: d,
            s: (dt.getMonth()+1) + "/" + dt.getDate()
        });
        localStorage.setItem('car_db_v3', JSON.stringify(db));
        document.getElementById('pop').style.display = 'none';
        document.getElementById('in-p').value = '';
        show();
    }

    function show() {
        var l = document.getElementById('list');
        var sy = document.getElementById('y').value;
        var sm = document.getElementById('m').value;
        var sum = 0;
        db.sort(function(a,b){ return new Date(b.d) - new Date(a.d); });
        l.innerHTML = '';
        db.forEach(function(i) {
            var id = new Date(i.d);
            if(String(id.getFullYear()) == sy && (sm == 'all' || String(id.getMonth()+1).padStart(2, '0') == sm)) {
                sum += parseFloat(i.p);
                // 修正：補回垃圾桶圖示，並提高透明度
                l.innerHTML += '<div class="item"><div class="info"><b>'+i.n+'</b><small>'+i.s+'</small></div><div class="price">$'+parseFloat(i.p).toLocaleString()+' <span onclick="del('+i.id+')" style="margin-left:10px; cursor:pointer; opacity:0.8">🗑️</span></div></div>';
            }
        });
        document.getElementById('total').innerText = '$ ' + sum.toLocaleString();
        document.getElementById('label').innerText = (sm == 'all' ? sy + '年' : sm + '月') + '支出';
    }

    function del(id) {
        // 在 App 模式下，confirm 按鈕會直接跳出來，妳直接點確認即可
        if(confirm("確定刪除嗎？")) {
            db = db.filter(function(x){ return x.id !== id; });
            localStorage.setItem('car_db_v3', JSON.stringify(db));
            show();
        }
    }
</script>
</body>
</html>
