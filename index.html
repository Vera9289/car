<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車務日誌</title>
    <style>
        :root { --blue: #A2D2FF; --light: #F8FBFF; }
        body { font-family: sans-serif; background: var(--light); margin: 0; padding: 20px; }
        .card { background: linear-gradient(135deg, #A2D2FF, #BDE0FE); color: white; padding: 25px; border-radius: 25px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* ➕ 按鈕：加強觸控區域 */
        .add-btn { 
            position: fixed; bottom: 40px; right: 30px; width: 70px; height: 70px; 
            background: #A2D2FF; color: white; border-radius: 50%; border: none;
            font-size: 40px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 9999; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        /* 彈窗畫面 */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 20px; width: 80%; max-width: 300px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btns { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <p>支出小計</p>
    <h2 id="total">$ 0</h2>
</div>

<div id="list"></div>

<button class="add-btn" onclick="document.getElementById('modal').style.display='flex'">+</button>

<div id="modal">
    <div class="modal-box">
        <h3 style="margin:0; color:#5B99C2">新增紀錄</h3>
        <input type="date" id="d">
        <select id="t" onchange="document.getElementById('n').style.display=(this.value=='油費'?'none':'block')">
            <option value="油費">油費 ⛽</option>
            <option value="保養">保養 🛠️</option>
            <option value="其他">其他 ✨</option>
        </select>
        <input type="text" id="n" placeholder="項目名稱" style="display:none">
        <input type="number" id="p" placeholder="金額" inputmode="decimal">
        <div class="btns">
            <button class="btn" onclick="document.getElementById('modal').style.display='none'">取消</button>
            <button class="btn" style="background:#A2D2FF; color:white" onclick="save()">儲存</button>
        </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('car_data')) || [];
    document.getElementById('d').valueAsDate = new Date();

    function save() {
        const p = document.getElementById('p').value;
        if(!p) return alert("要填金額喔");
        const item = {
            id: Date.now(),
            type: document.getElementById('t').value,
            name: document.getElementById('n').value || document.getElementById('t').value,
            price: p,
            date: document.getElementById('d').value
        };
        data.push(item);
        localStorage.setItem('car_data', JSON.stringify(data));
        document.getElementById('modal').style.display='none';
        document.getElementById('p').value='';
        show();
    }

    function show() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        let sum = 0;
        data.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(i => {
            sum += parseFloat(i.price);
            list.innerHTML += `<div class="item">
                <div><b>${i.name}</b><br><small>${i.date}</small></div>
                <div style="color:#7DB9E8"><b>$${i.price}</b> <span onclick="del(${i.id})">🗑️</span></div>
            </div>`;
        });
        document.getElementById('total').innerText = '$ ' + sum.toLocaleString();
    }

    function del(id) { if(confirm("刪除？")){ data=data.filter(i=>i.id!==id); localStorage.setItem('car_data',JSON.stringify(data)); show(); } }
    show();
</script>

</body>
</html>
