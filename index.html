<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>車務日誌 🚗</title>
    <style>
        :root { 
            --baby-blue: #A2D2FF; --soft-blue: #BDE0FE; --light-blue: #E7F2FF;
            --danger: #FFB3B3; --bg: #F8FBFF; 
        }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; padding: 20px 20px 100px; }
        .container { width: 100%; max-width: 500px; margin: auto; }
        
        .total-card {
            background: linear-gradient(135deg, var(--baby-blue), var(--soft-blue));
            color: white; padding: 25px; border-radius: 30px;
            box-shadow: 0 10px 25px rgba(162, 210, 255, 0.4); margin-bottom: 20px; text-align: center;
        }
        .total-card h2 { margin: 10px 0; font-size: 38px; font-weight: bold; }

        .filter-section { display: flex; gap: 10px; margin-bottom: 20px; }
        .filter-select {
            flex: 1; padding: 12px; border-radius: 15px; border: 1.5px solid var(--baby-blue);
            background: white; color: #5B99C2; font-size: 15px; font-weight: bold;
        }

        .item-card {
            background: white; border-radius: 22px; padding: 18px; margin-bottom: 15px;
            display: flex; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(162, 210, 255, 0.2);
        }
        .icon { width: 45px; height: 45px; background: var(--light-blue); border-radius: 12px; 
                display: flex; align-items: center; justify-content: center; font-size: 22px; margin-right: 15px; }
        .info { flex-grow: 1; }
        .tag { font-size: 11px; color: #5B99C2; background: var(--light-blue); padding: 3px 10px; border-radius: 20px; font-weight: bold; }
        .title { display: block; font-size: 16px; font-weight: bold; margin-top: 4px; color: #444; }
        .date { font-size: 12px; color: #BBB; }
        .price { font-size: 18px; font-weight: 900; color: #7DB9E8; margin-right: 8px; }
        .delete-btn { background: none; border: none; color: var(--danger); font-size: 18px; cursor: pointer; }

        .add-btn {
            position: fixed; bottom: 35px; right: 30px; width: 65px; height: 65px;
            background: var(--baby-blue); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; box-shadow: 0 8px 20px rgba(162, 210, 255, 0.6); border: none; z-index: 99;
        }

        #input-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 25px; border-radius: 25px; width: 80%; max-width: 300px; }
        .modal-content h3 { margin-top: 0; color: #5B99C2; text-align: center; }
        .modal-content select, .modal-content input { 
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #EEE; box-sizing: border-box; font-size: 16px; 
        }
        .modal-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-ok { background: var(--baby-blue); color: white; border: none; padding: 12px; flex: 1; border-radius: 12px; font-weight: bold; }
        .btn-cancel { background: #F0F0F0; color: #999; border: none; padding: 12px; flex: 1; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: #5B99C2; text-align: center;">車務消費日誌 ☁️</h2>
    <div class="total-card">
        <p id="total-label">支出小計</p>
        <h2 id="total-display">$ 0</h2>
        <p id="record-count">新的一年，新的開始</p>
    </div>
    <div class="filter-section">
        <select id="filter-year" class="filter-select" onchange="updateUI()"></select>
        <select id="filter-month" class="filter-select" onchange="updateUI()">
            <option value="all">整年紀錄</option>
            <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option>
            <option value="04">4月</option><option value="05">5月</option><option value="06">6月</option>
            <option value="07">7月</option><option value="08">8月</option><option value="09">9月</option>
            <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
    </div>
    <div id="list-container"></div>
</div>

<button class="add-btn" onclick="openModal()">+</button>

<div id="input-modal">
    <div class="modal-content">
        <h3>新增紀錄</h3>
        <input type="date" id="in-date">
        <select id="in-type" onchange="toggleNameInput()">
            <option value="油費">油費 ⛽</option>
            <option value="保養">保養 🛠️</option>
            <option value="車檢">車檢 🔍</option>
            <option value="其他">其他 ✨</option>
        </select>
        <input type="text" id="in-name" placeholder="項目名稱 (如：更換機油)" style="display: none;">
        <input type="number" id="in-price" placeholder="輸入金額" inputmode="decimal">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">取消</button>
            <button class="btn-ok" onclick="saveItem()">儲存</button>
        </div>
    </div>
</div>

<script>
    let expenses = JSON.parse(localStorage.getItem('carExpenses')) || [];
    
    (function init() {
        const yearSelect = document.getElementById('filter-year');
        const now = new Date();
        const startY = 2026;
        const currentY = now.getFullYear();
        for (let y = startY; y <= currentY + 5; y++) {
            let opt = document.createElement('option');
            opt.value = y; opt.text = y + " 年";
            yearSelect.appendChild(opt);
        }
        yearSelect.value = currentY;
        document.getElementById('in-date').valueAsDate = now;
        document.getElementById('filter-month').value = String(now.getMonth() + 1).padStart(2, '0');
        updateUI();
    })();

    // 切換名稱輸入框顯示狀態
    function toggleNameInput() {
        const type = document.getElementById('in-type').value;
        const nameInput = document.getElementById('in-name');
        if (type === '油費') {
            nameInput.style.display = 'none';
            nameInput.value = ''; // 清空內容
        } else {
            nameInput.style.display = 'block';
        }
    }

    function openModal() {
        document.getElementById('input-modal').style.display = 'flex';
        toggleNameInput(); // 每次打開檢查一次狀態
    }

    function closeModal() {
        document.getElementById('input-modal').style.display = 'none';
        document.getElementById('in-name').value = '';
        document.getElementById('in-price').value = '';
    }

    function saveItem() {
        const dVal = document.getElementById('in-date').value;
        const type = document.getElementById('in-type').value;
        const name = document.getElementById('in-name').value || type;
        const price = document.getElementById('in-price').value;

        if(!dVal || !price) { alert("日期與金額都要填喔！"); return; }

        const d = new Date(dVal);
        expenses.push({
            id: Date.now().toString(),
            type: type,
            name: name,
            price: price,
            date: (d.getMonth() + 1) + "月" + d.getDate() + "日",
            fullDate: dVal
        });
        
        closeModal();
        updateUI();
    }

    function updateUI() {
        const list = document.getElementById('list-container');
        const selY = document.getElementById('filter-year').value;
        const selM = document.getElementById('filter-month').value;
        let total = 0, count = 0;

        expenses.sort((a, b) => new Date(b.fullDate) - new Date(a.fullDate));
        list.innerHTML = '';

        expenses.forEach(item => {
            const iDate = new Date(item.fullDate);
            const iY = String(iDate.getFullYear());
            const iM = String(iDate.getMonth() + 1).padStart(2, '0');

            if (iY === selY && (selM === 'all' || iM === selM)) {
                total += parseFloat(item.price);
                count++;
                let icon = '✨';
                if(item.type === '油費') icon = '⛽';
                if(item.type === '保養') icon = '🛠️';
                if(item.type === '車檢') icon = '🔍';

                list.innerHTML += `
                    <div class="item-card">
                        <div class="icon">${icon}</div>
                        <div class="info">
                            <span class="tag">${item.type}</span>
                            <span class="title">${item.name}</span>
                            <span class="date">${item.date}</span>
                        </div>
                        <div class="price">$${parseFloat(item.price).toLocaleString()}</div>
                        <button class="delete-btn" onclick="deleteItem('${item.id}')">🗑️</button>
                    </div>`;
            }
        });
        document.getElementById('total-display').innerText = '$ ' + total.toLocaleString();
        document.getElementById('record-count').innerText = '目前有 ' + count + ' 筆紀錄';
        localStorage.setItem('carExpenses', JSON.stringify(expenses));
    }

    function deleteItem(id) {
        if(confirm("確定刪除這筆紀錄嗎？")) {
            expenses = expenses.filter(i => i.id !== id);
            updateUI();
        }
    }
</script>
</body>
</html>
